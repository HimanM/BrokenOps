name: Manual Distro Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Deploy and Labs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify deploy.sh works non-interactively
        env:
          ASSUME_YES: "1"
        run: |
          # Make deploy.sh executable
          chmod +x deploy.sh
          # Run deploy.sh non-interactively
          ./deploy.sh

      - name: Setup Host Traversal Permissions (GHA specific)
        run: |
          # Allow libvirt-qemu to traverse the runner's home directory
          sudo chmod 755 /home/runner
          sudo chmod 755 /home/runner/work
          sudo chmod 755 /home/runner/work/BrokenOps

      - name: Verify deploy.sh dry-run on Fedora (dnf)
        run: |
          docker run --rm --device /dev/kvm -v ${{ github.workspace }}:/workspace -w /workspace fedora:40 bash -c "
            dnf install -y systemd && \
            export DRY_RUN=1 && \
            export ASSUME_YES=1 && \
            ./deploy.sh
          "

      - name: Verify deploy.sh dry-run on Arch Linux (pacman)
        run: |
          docker run --rm --device /dev/kvm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest bash -c "
            pacman -Sy --noconfirm systemd && \
            export DRY_RUN=1 && \
            export ASSUME_YES=1 && \
            ./deploy.sh
          "

      - name: Wait for API to be healthy
        run: |
          for i in {1..30}; do
            if curl -s http://localhost/api/labs > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API..."
            sleep 2
          done

      - name: Install Python verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko requests pyyaml

      - name: Run verification for nginx-broken lab
        run: |
          # Since deploy.sh runs inside Docker container, let's fix permission on libvirt socket for host runner
          sudo chmod 666 /var/run/libvirt/libvirt-sock
          # Verify the lab
          python scripts/test_labs.py --key keys/id_ed25519 --labs nginx-broken
