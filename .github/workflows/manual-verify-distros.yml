name: Manual Distro Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Ubuntu 24.04
            image_name: ubuntu-24.04-base.qcow2
            image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
          - distro: Arch Linux
            image_name: arch-base.qcow2
            image_url: https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
          - distro: Fedora 40
            image_name: fedora-40-base.qcow2
            image_url: https://download.fedoraproject.org/pub/fedora/linux/releases/40/Cloud/x86_64/images/Fedora-Cloud-Base-Generic.x86_64-40-1.14.qcow2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify deploy.sh works non-interactively
        env:
          ASSUME_YES: "1"
        run: |
          # Make deploy.sh executable
          chmod +x deploy.sh
          # Run deploy.sh non-interactively
          ./deploy.sh

      - name: Setup Host Traversal Permissions (GHA specific)
        run: |
          # Allow libvirt-qemu to traverse the runner's home directory
          sudo chmod 755 /home/runner
          sudo chmod 755 /home/runner/work
          sudo chmod 755 /home/runner/work/BrokenOps

      - name: Download Distro Base Image (if not default)
        run: |
          mkdir -p data/images
          if [ ! -f "data/images/${{ matrix.image_name }}" ]; then
            curl -L -o data/images/${{ matrix.image_name }} ${{ matrix.image_url }}
          fi

      - name: Modify lab.yaml to target matrix distro
        run: |
          python -m pip install PyYAML
          python -c "
          import yaml
          with open('labs/nginx-broken/lab.yaml', 'r') as f:
              data = yaml.safe_load(f)
          data['vm']['image'] = '${{ matrix.image_name }}'
          with open('labs/nginx-broken/lab.yaml', 'w') as f:
              yaml.dump(data, f)
          "



      - name: Verify deploy.sh dry-run on Fedora (dnf)
        if: matrix.distro == 'Fedora 40'
        run: |
          docker run --rm --device /dev/kvm -v ${{ github.workspace }}:/workspace -w /workspace fedora:40 bash -c "
            dnf install -y systemd && \
            export DRY_RUN=1 && \
            export ASSUME_YES=1 && \
            ./deploy.sh
          "

      - name: Verify deploy.sh dry-run on Arch Linux (pacman)
        if: matrix.distro == 'Arch Linux'
        run: |
          docker run --rm --device /dev/kvm -v ${{ github.workspace }}:/workspace -w /workspace archlinux:latest bash -c "
            pacman -Sy --noconfirm systemd && \
            export DRY_RUN=1 && \
            export ASSUME_YES=1 && \
            ./deploy.sh
          "

      - name: Wait for API to be healthy
        run: |
          for i in {1..30}; do
            if curl -s http://localhost/api/labs > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API..."
            sleep 2
          done

      - name: Install Python verification dependencies
        run: |
          python -m pip install --upgrade pip
          pip install paramiko requests pyyaml

      - name: Run verification for nginx-broken lab
        run: |
          # Since deploy.sh runs inside Docker container, let's fix permission on libvirt socket for host runner
          sudo chmod 666 /var/run/libvirt/libvirt-sock
          # Verify the lab
          python scripts/test_labs.py --key keys/id_ed25519 --labs nginx-broken
