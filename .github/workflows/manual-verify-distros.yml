name: Manual Distro Verification

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: Ubuntu 24.04
            nested: false
          - distro: Arch Linux
            nested: true
            image_name: arch-base.qcow2
            image_url: https://geo.mirror.pkgbuild.com/images/latest/Arch-Linux-x86_64-cloudimg.qcow2
          - distro: Fedora 40
            nested: true
            image_name: fedora-40-base.qcow2
            image_url: https://mirror.math.princeton.edu/pub/fedora-archive/fedora/linux/releases/40/Cloud/x86_64/images/Fedora-Cloud-Base-Generic.x86_64-40-1.14.qcow2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install QEMU and dependencies on Host GHA Runner
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-kvm qemu-utils genisoimage netcat-openbsd

      - name: Native Setup & Verification (Ubuntu)
        if: ${{ !matrix.nested }}
        env:
          ASSUME_YES: "1"
        run: |
          # Patch for host networking in CI
          sed -i 's/ports:/network_mode: \"host\"\n    #ports:/' docker-compose.yml
          sed -i '/extra_hosts:/d' docker-compose.yml
          sed -i '/- \"host.docker.internal:host-gateway\"/d' docker-compose.yml
          sed -i 's/host.docker.internal/127.0.0.1/g' frontend/nginx.conf
          
          chmod +x deploy.sh
          ./deploy.sh
          
          # Setup traversal permissions
          sudo chmod 755 /home/runner /home/runner/work /home/runner/work/BrokenOps
          
          # Wait for API to be healthy
          for i in {1..30}; do
            if curl -s -I http://localhost/api/labs | grep -q \"200 OK\"; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API (200 OK)..."
            sleep 2
          done

          # Install python dependencies and verify lab
          python -m pip install --upgrade pip
          pip install paramiko requests pyyaml
          sudo chmod 666 /var/run/libvirt/libvirt-sock
          python scripts/test_labs.py --key keys/id_ed25519 --labs nginx-broken

      - name: Download Nested Host VM Base Image
        if: ${{ matrix.nested }}
        run: |
          mkdir -p data/images
          curl -f -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o data/images/${{ matrix.image_name }} ${{ matrix.image_url }}

      - name: Boot Nested Host VM and Copy Workspace
        if: ${{ matrix.nested }}
        run: |
          chmod +x scripts/run_nested_host.sh
          ./scripts/run_nested_host.sh "${{ matrix.distro }}" data/images/${{ matrix.image_name }}

      - name: Run deploy.sh and verification inside Nested VM
        if: ${{ matrix.nested }}
        run: |
          # SSH commands to setup, deploy, and verify inside the nested VM
          ssh -p 2222 -o StrictHostKeyChecking=no -i keys/id_ed25519 root@localhost "
            set -e
            echo '=== Installing Python dependencies in Guest ==='
            if command -v dnf &> /dev/null; then
              dnf install -y python3 python3-pip
            elif command -v pacman &> /dev/null; then
              pacman -Sy --noconfirm python python-pip
            fi
            pip install --upgrade pip --break-system-packages || pip install --upgrade pip
            pip install --break-system-packages paramiko requests pyyaml || pip install paramiko requests pyyaml
            
            echo '=== Running deploy.sh inside Guest ==='
            cd /workspace
            
            # Patch for host networking in CI
            sed -i 's/ports:/network_mode: \"host\"\n    #ports:/' docker-compose.yml
            sed -i '/extra_hosts:/d' docker-compose.yml
            sed -i '/- \"host.docker.internal:host-gateway\"/d' docker-compose.yml
            sed -i 's/host.docker.internal/127.0.0.1/g' frontend/nginx.conf
            
            export ASSUME_YES=1
            chmod +x deploy.sh
            ./deploy.sh
            
            echo '=== Waiting for API inside Guest ==='
            for i in {1..30}; do
              # Check for 200 OK specifically
              if curl -s -I http://localhost/api/labs | grep -q \"200 OK\"; then
                echo 'API is up!'
                break
              fi
              echo 'Waiting for API (200 OK)...'
              sleep 2
            done
            
            echo '=== Verifying lab inside Guest ==='
            # Grant permission to libvirt socket in VM guest
            chmod 666 /var/run/libvirt/libvirt-sock
            python scripts/test_labs.py --key keys/id_ed25519 --labs nginx-broken
          "
