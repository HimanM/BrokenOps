name: Observer

# --- Trigger Configuration ---
on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'
  workflow_dispatch:
  # Automatically triggers the Observer if specific workflows are fired manually (workflow_dispatch)
  # You must maintain this list with the names of any workflows you want to monitor manually.
  workflow_run:
    workflows:
      - "Manual Pre-Release"
      - "Remove Solutions on Main"
    types:
      - requested

# --- Concurrency Control ---
# Ensures only one observer runs per commit SHA to prevent duplicate polling or race conditions.
concurrency:
  group: observer-${{ github.sha }}
  cancel-in-progress: true

# --- Required Permissions ---
permissions:
  actions: write # Required to delete duplicate workflow runs
  contents: write # Upgraded to 'write' to allow committing the SVG back to the repo

# --- Core Telemetry Job ---
jobs:
  telemetry:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository to access local action scripts
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Run the Telemetry Observer Action
      - name: Run Telemetry Observer Action
        uses: HimanM/Github-Actions-Telemetry@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          initial_delay: "60"
          max_timeout: "120"
          poll_interval: "15"
          ignored_workflows: "Observer,CodeQL,Dependabot,Copilot cloud agent"
          # api_url: ${{ secrets.API_URL }}
          # api_key: ${{ secrets.API_KEY }}
          generate_svg_report: "true"
          
          # Automatically delete older cancelled/skipped observer runs for this commit to keep Actions UI clean
          clean_concurrent_runs: "true"

      # 3. Upload the generated JSON payload as a workflow artifact
      - name: Upload Telemetry Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-test-jsons
          path: test_jsons/

      # 4. Upload the generated SVG diagram as a separate workflow artifact
      - name: Upload SVG Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-svg-report
          path: workflow_status.svg

      # --- Auto-Commit SVG Feature (Optional) ---
      # This step automatically commits the generated workflow_status.svg file to the repository
      # and injects it into the README.md so it displays cleanly in your project.
      - name: Auto-Commit SVG to Repository
        if: success()
        run: |
          if [ -f "workflow_status.svg" ]; then
            # 1. Inject the SVG link into README.md if it doesn't already exist
            # We search only the first 15 lines of README.md to avoid matching any example code blocks
            # in the documentation at the bottom of the file.
            if ! head -n 15 README.md | grep -q '!\[Workflow Timeline\]'; then
              echo "Injecting SVG markdown into README.md"
              sed -i '/<!-- telemetry-svg-start -->/a ![Workflow Timeline](workflow_status.svg)' README.md
            else
              echo "SVG link already present in README.md header. Skipping injection."
            fi
            
            # 2. Configure Git bot identity
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # 3. Stage the files
            git add workflow_status.svg README.md
            
            # 4. Check if there are actual diffs to commit
            if ! git diff --staged --quiet; then
              git commit -m "docs: Auto-update workflow telemetry SVG timeline"
              git push
            else
              echo "No visual changes in the SVG. Skipping commit."
            fi
          else
            echo "No workflow_status.svg found, skipping document update."
          fi
