services:
  brokenops-be:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brokenops-be
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - LIBVIRT_GID=${LIBVIRT_GID:-104}
    volumes:
      - ./data:/app/data
      - ./labs:/app/labs
      - /var/run/libvirt:/var/run/libvirt
    # We do NOT expose ports here, keeping the backend completely hidden in the docker network
    restart: unless-stopped

  brokenops-fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brokenops-fe
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - brokenops-be
    restart: unless-stopped
