#cloud-config
packages:
  - nginx

runcmd:
  # Intentional break: configure nginx to listen on invalid port to break it
  - sed -i 's/listen 80 default_server;/listen 80808 default_server;/' /etc/nginx/sites-available/default
  - sed -i 's/listen \[::\]:80 default_server;/listen \[::\]:80808 default_server;/' /etc/nginx/sites-available/default
  - systemctl restart nginx || true
