#cloud-config
packages:
  - mysql-server
  - mysql-client

runcmd:
  - |
    # Create a user with 'auth_socket' (which requires local Unix socket matching system user)
    # But we want the application to use password-based auth, so 'auth_socket' will fail for remote or non-matching local users.
    mysql -e "CREATE USER 'appuser'@'localhost' IDENTIFIED WITH 'auth_socket';"
    mysql -e "GRANT ALL PRIVILEGES ON *.* TO 'appuser'@'localhost';"
    mysql -e "FLUSH PRIVILEGES;"
