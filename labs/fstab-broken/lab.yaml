id: fstab-broken
name: Filesystem Missing After Reboot
category: linux
difficulty: intermediate
vm:
  name: fstab-lab
  image: ubuntu-24.04-base.qcow2
  cpu: 1
  memory: 1024
  disk: 10G
cloud_init: cloud-init.yaml
verify_script: verify.sh
description:
  summary: "A secondary filesystem failed to mount on boot due to an incorrect UUID in /etc/fstab."
  story: "A secondary storage volume was configured to automatically mount at /mnt/data. However, after rebooting the system, the volume is not mounted. The system booted successfully due to the 'nofail' option, but the files on the volume are inaccessible. Investigate why the mount failed, fix /etc/fstab, and mount the filesystem."
  objectives:
    - Identify the reason why the filesystem at /mnt/data did not mount automatically
    - Obtain the correct UUID of the target storage filesystem
    - Correct the UUID in /etc/fstab and mount the filesystem successfully
tags:
  - linux
  - storage
  - filesystems
