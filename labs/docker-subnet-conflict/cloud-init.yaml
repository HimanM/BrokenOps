#cloud-config
packages:
  - docker.io

runcmd:
  - |
    # Get the host's primary subnet using hostname -I
    HOST_IP=\$(hostname -I | awk '{print \$1}')
    HOST_SUBNET=\$(ip -o -f inet addr show | grep "\$HOST_IP" | awk '{print \$4}' | head -n 1)
    # Create a docker network that overlaps with the host's subnet
    docker network create --subnet=\$HOST_SUBNET broken_net
  - |
    # Start a container on this network
    docker run -d --name app_container --network broken_net alpine sleep infinity
