#cloud-config
runcmd:
  - |
    # Add a mock internal service to /etc/hosts with its FQDN
    echo "10.0.0.50  api-server.internal.brokenops.io" >> /etc/hosts
  - |
    # Configure a bogus search domain in systemd-resolved
    mkdir -p /etc/systemd/resolved.conf.d
    cat <<EOF > /etc/systemd/resolved.conf.d/broken-search.conf
    [Resolve]
    Domains=bogus.domain.corp
    EOF
    systemctl restart systemd-resolved
