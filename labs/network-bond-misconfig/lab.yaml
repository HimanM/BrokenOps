id: network-bond-misconfig
name: Network Bond Mode Misconfigured
category: networking
difficulty: advanced
vm:
  name: bond-lab
  image: ubuntu-24.04-base.qcow2
  memory: 1024
  cpu: 1
  disk: 10G
cloud_init: cloud-init.yaml
verify_script: verify.sh

description:
  summary: "Bonded network interfaces are using an unsupported mode for the current switch infrastructure."
  story: "The server team has attempted to set up a high-availability network bond, but they used a mode that requires special switch support (802.3ad) which isn't available. You need to change the bonding mode to 'active-backup' to ensure stability."
  objectives:
    - Inspect the current bonding status in /proc/net/bonding/
    - Identify that the current mode (802.3ad) is non-functional
    - Correct the Netplan configuration to use the more compatible 'active-backup' mode
tags:
  - networking
  - linux
  - netplan
