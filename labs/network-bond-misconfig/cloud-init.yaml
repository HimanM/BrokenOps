#cloud-config
packages:
  - ifenslave
  - net-tools

runcmd:
  - |
    # Attempt to load bonding module
    modprobe bonding || true
    
    # Create the bond0 interface manually to ensure it exists
    ip link add bond0 type bond
    ip link set bond0 type bond mode 802.3ad
    
    # Create two dummy interfaces
    modprobe dummy numdummies=2 || true
    ip link add eth1 type dummy || true
    ip link add eth2 type dummy || true
    
    # Enslave them
    ip link set eth1 master bond0
    ip link set eth2 master bond0
    
    # Bring everything up
    ip link set eth1 up
    ip link set eth2 up
    ip link set bond0 up
    
    # Create a persistent Netplan config for the player to find
    cat <<EOF > /etc/netplan/60-bond.yaml
    network:
      version: 2
      renderer: networkd
      ethernets:
        eth1:
          optional: true
        eth2:
          optional: true
      bonds:
        bond0:
          interfaces: [eth1, eth2]
          parameters:
            mode: 802.3ad
            mii-monitor-interval: 100
    EOF
