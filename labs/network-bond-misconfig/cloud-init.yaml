#cloud-config
packages:
  - ifenslave
  - net-tools

runcmd:
  - |
    # Load bonding and dummy modules
    modprobe bonding || true
    modprobe dummy numdummies=2 || true
    
    # Create two dummy interfaces
    ip link add eth1 type dummy || true
    ip link add eth2 type dummy || true
    ip link set eth1 up
    ip link set eth2 up
    
    # Configure Netplan with '802.3ad' (the break)
    cat <<EOF > /etc/netplan/60-bond.yaml
    network:
      version: 2
      renderer: networkd
      ethernets:
        eth1:
          optional: true
        eth2:
          optional: true
      bonds:
        bond0:
          interfaces: [eth1, eth2]
          parameters:
            mode: 802.3ad
            mii-monitor-interval: 100
    EOF
    
    netplan apply
