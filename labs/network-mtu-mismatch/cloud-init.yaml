#cloud-config
packages:
  - net-tools
  - nginx

runcmd:
  - |
    # Find primary interface
    PRIMARY_IF=$(ip route | grep default | awk '{print $5}' | head -n 1)
    if [ -z "$PRIMARY_IF" ]; then PRIMARY_IF="eth0"; fi
    
    # Configure with a very low MTU
    ip link set dev "$PRIMARY_IF" mtu 600
    
    # Create a persistent Netplan config for the player to find
    # We use a broad match for the interface to ensure it applies
    cat <<EOF > /etc/netplan/60-mtu.yaml
    network:
      version: 2
      renderer: networkd
      ethernets:
        $PRIMARY_IF:
          dhcp4: true
          mtu: 600
    EOF
    
    # Create a large file for testing downloads
    dd if=/dev/urandom of=/var/www/html/largefile.bin bs=1M count=10
