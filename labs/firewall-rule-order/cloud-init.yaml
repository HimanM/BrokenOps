#cloud-config
packages:
  - iptables
  - nginx

runcmd:
  - |
    # Flush existing rules to ensure a clean break
    iptables -F
    
    # 1. Allow loopback
    iptables -A INPUT -i lo -j ACCEPT
    
    # 2. Allow established/related
    iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
    
    # 3. Allow SSH (crucial for lab access)
    iptables -A INPUT -p tcp --dport 22 -j ACCEPT
    
    # 4. THE BREAK: A broad drop rule BEFORE the allow port 80 rule
    iptables -A INPUT -p tcp --dport 80:100 -j DROP
    
    # 5. The rule that 'should' allow web traffic but is reached too late
    iptables -A INPUT -p tcp --dport 80 -j ACCEPT
    
    # Default policy (optional, but good practice)
    # iptables -P INPUT DROP
