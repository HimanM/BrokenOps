id: systemd-broken
name: Systemd Service Fails After Reboot
category: linux
difficulty: beginner
vm:
  name: systemd-lab
  image: ubuntu-24.04-base.qcow2
  cpu: 1
  memory: 1024
  disk: 10G
cloud_init: cloud-init.yaml
verify_script: verify.sh
description:
  summary: "A custom background service fails to start on boot."
  story: "A developer deployed a background service named 'demo' to log system status, but it fails to start automatically on boot. Dig through the systemd configuration to find out why it is failing and fix it."
  objectives:
    - Locate the unit file for the 'demo' service and diagnose the startup failure
    - Fix the incorrect executable path defined in the service file
    - Reload the systemd configuration and ensure the service starts and is enabled on boot
tags:
  - linux
  - systemd
