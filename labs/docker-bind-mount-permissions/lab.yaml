id: "docker-bind-mount-permissions"
name: "Docker Bind Mount Permissions"
category: "docker"
difficulty: "intermediate"
description:
  summary: "Application container cannot write to its data volume due to host permission mismatch"
vm:
  name: "docker-perm-lab"
  memory: 2048
  cpu: 2
  disk: "10G"
cloud_init: "cloud-init.yaml"
verify_script: "verify.sh"
exposed_ports:
  - 8080
