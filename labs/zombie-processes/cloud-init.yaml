#cloud-config
packages:
  - python3

runcmd:
  - |
    # Create the bad parent script that creates zombies
    cat <<EOF > /usr/local/bin/bad_parent.py
    import os
    import time
    import sys

    # Fork 10 children and let them die without waiting
    for _ in range(10):
        pid = os.fork()
        if pid == 0:
            # Child process: exits immediately, becoming a zombie
            sys.exit(0)
    
    # Parent process: sleeps forever without waiting for children
    while True:
        time.sleep(10)
    EOF
    chmod +x /usr/local/bin/bad_parent.py
    # Run it in the background
    nohup python3 /usr/local/bin/bad_parent.py > /dev/null 2>&1 &
