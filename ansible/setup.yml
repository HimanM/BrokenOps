---
- name: Setup BrokenOps Host Dependencies
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Gather distribution facts
      ansible.builtin.setup:
        filter: ansible_distribution*

    - name: Remove conflicting Docker packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - containerd
          - runc
          - containerd.io
          - docker-ce
          - docker-ce-cli
        state: absent
      when: ansible_os_family == "Debian"

    - name: Install dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-v2
          - qemu-utils
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - genisoimage
          - xorriso
          - curl
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install dependencies (RedHat/Fedora)
      ansible.builtin.dnf:
        name:
          - moby-engine
          - docker-compose
          - qemu-kvm
          - qemu-img
          - libvirt
          - libvirt-client
          - bridge-utils
          - genisoimage
          - xorriso
          - curl
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install dependencies (Arch)
      ansible.builtin.pacman:
        name:
          - docker
          - docker-compose
          - qemu-base
          - libvirt
          - iproute2
          - cdrtools
          - curl
        state: present
        update_cache: yes
      when: ansible_os_family == "Archlinux"

    - name: Install dependencies (Alpine)
      ansible.builtin.apk:
        name:
          - docker
          - docker-cli-compose
          - qemu-img
          - libvirt
          - bridge
          - cdrkit
          - curl
        state: present
        update_cache: yes
      when: ansible_os_family == "Alpine"

    - name: Ensure docker service is started and enabled
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
      when: ansible_service_mgr == "systemd"

    - name: Ensure libvirtd service is started and enabled
      ansible.builtin.systemd:
        name: libvirtd
        state: started
        enabled: yes
      when: ansible_service_mgr == "systemd"

    - name: Ensure docker service is started (OpenRC)
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      when: ansible_service_mgr == "openrc"

    - name: Ensure libvirtd service is started (OpenRC)
      ansible.builtin.service:
        name: libvirtd
        state: started
        enabled: yes
      when: ansible_service_mgr == "openrc"

    - name: Add current user to groups
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') or lookup('env', 'LOGNAME') }}"
        groups: 
          - docker
          - libvirt
          - kvm
        append: yes
      when: lookup('env', 'USER') != 'root'

    - name: Set permissions on libvirt socket
      ansible.builtin.file:
        path: /var/run/libvirt/libvirt-sock
        mode: '0666'
      when: ansible_os_family != "Windows"

    - name: Set permissions on KVM device
      ansible.builtin.file:
        path: /dev/kvm
        mode: '0666'
      when: ansible_os_family != "Windows"

    - name: Ensure workspace is traversable for libvirt
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0755'
        state: directory
      loop:
        - /workspace
        - /workspace/data
        - /workspace/data/images
      when: ansible_os_family != "Windows" and lookup('env', 'PWD') == '/workspace'

    - name: Ensure libvirt default network is defined and active
      ansible.builtin.shell: |
        if ! virsh net-info default >/dev/null 2>&1; then
          cat <<EOF > /tmp/default-net.xml
          <network>
            <name>default</name>
            <forward mode='nat'/>
            <bridge name='virbr0' stp='on' delay='0'/>
            <ip address='192.168.122.1' netmask='255.255.255.0'>
              <dhcp>
                <range start='192.168.122.2' end='192.168.122.254'/>
              </dhcp>
            </ip>
          </network>
        EOF
          virsh net-define /tmp/default-net.xml
        fi
        virsh net-start default || true
        virsh net-autostart default || true
      changed_when: false
