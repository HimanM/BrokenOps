---
- name: Setup BrokenOps Host Dependencies
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Gather distribution facts
      ansible.builtin.setup:
        filter: ansible_distribution*

    - name: Remove conflicting Docker packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - containerd
          - runc
          - containerd.io
          - docker-ce
          - docker-ce-cli
        state: absent
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    - name: Install system dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - qemu-utils
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - dnsmasq-base
          - iptables
          - genisoimage
          - xorriso
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Docker components (Debian/Ubuntu)
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - docker.io
        - docker-compose-plugin
        - docker-compose
      ignore_errors: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install dependencies (RedHat/Fedora)
      ansible.builtin.dnf:
        name:
          - moby-engine
          - docker-compose
          - qemu-kvm
          - qemu-img
          - libvirt
          - libvirt-client
          - dnsmasq
          - bridge-utils
          - genisoimage
          - xorriso
          - curl
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install dependencies (Arch)
      ansible.builtin.pacman:
        name:
          - docker
          - qemu-base
          - libvirt
          - dnsmasq
          - iproute2
          - cdrtools
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install dependencies (Alpine)
      ansible.builtin.apk:
        name:
          - docker
          - docker-cli-compose
          - qemu-img
          - libvirt
          - bridge
          - cdrkit
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Alpine"

    - name: Ensure docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]

    - name: Ensure libvirt service is started and enabled
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - libvirtd
        - libvirt-daemon-system
      failed_when: false
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]

    - name: Add current user to groups
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') or lookup('env', 'LOGNAME') }}"
        groups: 
          - docker
          - libvirt
          - kvm
        append: yes
      when: lookup('env', 'USER') != 'root'

    - name: Disable SELinux (Fedora/RedHat)
      ansible.builtin.selinux:
        state: disabled
      when: ansible_facts['os_family'] == "RedHat"
      failed_when: false

    - name: Disable SELinux immediately (setenforce 0)
      ansible.builtin.command: setenforce 0
      when: ansible_facts['os_family'] == "RedHat"
      failed_when: false
      changed_when: false

    - name: Check if Libvirt QEMU config exists
      ansible.builtin.stat:
        path: /etc/libvirt/qemu.conf
      register: qemu_conf

    - name: Configure Libvirt to skip security driver (permissive)
      ansible.builtin.lineinfile:
        path: /etc/libvirt/qemu.conf
        line: "{{ item }}"
        state: present
      loop:
        - 'security_driver = "none"'
        - 'user = "root"'
        - 'group = "root"'
      when: qemu_conf.stat.exists
      notify: Restart libvirt service

    - name: Disable firewalls (Aggressive for CI)
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - firewalld
        - ufw
        - iptables
      failed_when: false
      when: ansible_facts['service_mgr'] == "systemd"

    - name: Ensure workspace and data are traversable and readable/writable
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0777'
        state: directory
        recurse: no
      loop:
        - /workspace
        - /workspace/data
        - /workspace/data/images
        - /workspace/data/vms
        - /workspace/keys
      when: ansible_facts['os_family'] != "Windows" and (lookup('env', 'PWD') == '/workspace' or ansible_env.PWD == '/workspace')

    - name: Set permissions on libvirt socket
      ansible.builtin.file:
        path: /var/run/libvirt/libvirt-sock
        mode: '0666'
      when: ansible_facts['os_family'] != "Windows"

    - name: Set permissions on KVM device
      ansible.builtin.file:
        path: /dev/kvm
        mode: '0666'
      when: ansible_facts['os_family'] != "Windows"
      failed_when: false

    - name: Ensure BrokenOps libvirt network is defined
      ansible.builtin.shell: |
        if virsh net-info brokenops >/dev/null 2>&1; then
          if ! virsh net-dumpxml brokenops | grep -q "address='192.168.123.1'"; then
            virsh net-destroy brokenops >/dev/null 2>&1 || true
            virsh net-undefine brokenops
          fi
        fi

        if ! virsh net-info brokenops >/dev/null 2>&1; then
          cat <<EOF > /tmp/brokenops-net.xml
          <network>
            <name>brokenops</name>
            <forward mode='nat'/>
            <bridge name='brokenops0' stp='on' delay='0'/>
            <ip address='192.168.123.1' netmask='255.255.255.0'>
              <dhcp>
                <range start='192.168.123.2' end='192.168.123.254'/>
              </dhcp>
            </ip>
          </network>
        EOF
          virsh net-define /tmp/brokenops-net.xml
        fi
      changed_when: false

    - name: Force activate BrokenOps libvirt network
      ansible.builtin.shell: |
        # Check if active
        if ! virsh net-info brokenops | grep -q "Active:.*yes"; then
          # Stop conflicting dnsmasq if any
          systemctl stop dnsmasq >/dev/null 2>&1 || true
          # Ensure bridge is clear
          ip link set brokenops0 down >/dev/null 2>&1 || true
          brctl delbr brokenops0 >/dev/null 2>&1 || true
          # Start network
          virsh net-start brokenops
        fi
        virsh net-autostart brokenops || true
      changed_when: false
      failed_when: false

    - name: Final check for BrokenOps libvirt network status
      ansible.builtin.shell: virsh net-info brokenops
      register: net_info
      changed_when: false

    - name: Debug libvirt network status
      ansible.builtin.debug:
        var: net_info.stdout_lines

  handlers:
    - name: Restart libvirt service
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop:
        - libvirtd
        - libvirt-daemon-system
      failed_when: false
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]
