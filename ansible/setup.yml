---
- name: Setup BrokenOps Host Dependencies
  hosts: localhost
  connection: local
  become: true
  vars:
    # Service names vary by distro
    libvirt_service_name: "{{ 'libvirtd' if ansible_facts['os_family'] != 'Debian' else 'libvirt-daemon-system' }}"

  tasks:
    - name: Gather distribution facts
      ansible.builtin.setup:
        filter: ansible_distribution*

    - name: Remove conflicting Docker packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - containerd
          - runc
          - containerd.io
          - docker-ce
          - docker-ce-cli
        state: absent
      when: ansible_facts['os_family'] == "Debian"

    - name: Install dependencies (Debian/Ubuntu)
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
          - qemu-utils
          - libvirt-daemon-system
          - libvirt-clients
          - bridge-utils
          - genisoimage
          - xorriso
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    - name: Fallback install for older Debian/Ubuntu (docker-compose v1)
      ansible.builtin.apt:
        name:
          - docker-compose
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install dependencies (RedHat/Fedora)
      ansible.builtin.dnf:
        name:
          - moby-engine
          - docker-compose
          - qemu-kvm
          - qemu-img
          - libvirt
          - libvirt-client
          - bridge-utils
          - genisoimage
          - xorriso
          - curl
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Install dependencies (Arch)
      ansible.builtin.pacman:
        name:
          - docker
          - docker-compose
          - docker-buildx
          - qemu-base
          - libvirt
          - iproute2
          - cdrtools
          - curl
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Ensure docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]

    - name: Ensure libvirt service is started and enabled
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - libvirtd
        - libvirt-daemon-system
      failed_when: false
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]

    - name: Add current user to groups
      ansible.builtin.user:
        name: "{{ lookup('env', 'USER') or lookup('env', 'LOGNAME') }}"
        groups: 
          - docker
          - libvirt
          - kvm
        append: yes
      when: lookup('env', 'USER') != 'root'

    - name: Disable SELinux (Fedora/RedHat)
      ansible.builtin.selinux:
        state: disabled
      when: ansible_facts['os_family'] == "RedHat"
      failed_when: false

    - name: Disable SELinux immediately (setenforce 0)
      ansible.builtin.command: setenforce 0
      when: ansible_facts['os_family'] == "RedHat"
      failed_when: false
      changed_when: false

    - name: Configure Libvirt to skip security driver (permissive)
      ansible.builtin.lineinfile:
        path: /etc/libvirt/qemu.conf
        line: "{{ item }}"
        state: present
      loop:
        - 'security_driver = "none"'
        - 'user = "root"'
        - 'group = "root"'
      when: ansible_facts['os_family'] != "Windows"

    - name: Restart libvirt service if config changed
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop:
        - libvirtd
        - libvirt-daemon-system
      failed_when: false
      when: ansible_facts['service_mgr'] in ["systemd", "openrc"]

    - name: Disable firewalls (Aggressive for CI)
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - firewalld
        - ufw
        - iptables
      failed_when: false
      when: ansible_facts['service_mgr'] == "systemd"

    - name: Ensure workspace and data are traversable and readable/writable
      ansible.builtin.file:
        path: "{{ item }}"
        mode: '0777'
        state: directory
        recurse: no
      loop:
        - /workspace
        - /workspace/data
        - /workspace/data/images
        - /workspace/data/vms
        - /workspace/keys
      when: ansible_facts['os_family'] != "Windows" and (lookup('env', 'PWD') == '/workspace' or ansible_env.PWD == '/workspace')

    - name: Set permissions on libvirt socket
      ansible.builtin.file:
        path: /var/run/libvirt/libvirt-sock
        mode: '0666'
      when: ansible_facts['os_family'] != "Windows"

    - name: Set permissions on KVM device
      ansible.builtin.file:
        path: /dev/kvm
        mode: '0666'
      when: ansible_facts['os_family'] != "Windows"
      failed_when: false

    - name: Ensure libvirt default network is defined
      ansible.builtin.shell: |
        if ! virsh net-info default >/dev/null 2>&1; then
          cat <<EOF > /tmp/default-net.xml
          <network>
            <name>default</name>
            <forward mode='nat'/>
            <bridge name='virbr0' stp='on' delay='0'/>
            <ip address='192.168.122.1' netmask='255.255.255.0'>
              <dhcp>
                <range start='192.168.122.2' end='192.168.122.254'/>
              </dhcp>
            </ip>
          </network>
        EOF
          virsh net-define /tmp/default-net.xml
        fi
      changed_when: false

    - name: Force activate libvirt default network
      ansible.builtin.shell: |
        # Check if active
        if ! virsh net-info default | grep -q "Active:.*yes"; then
          # Ensure bridge is clear
          ip link set virbr0 down >/dev/null 2>&1 || true
          brctl delbr virbr0 >/dev/null 2>&1 || true
          # Start network
          virsh net-start default
        fi
        virsh net-autostart default || true
      changed_when: false
      failed_when: false
